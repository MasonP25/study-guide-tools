<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  iframe { width: 100%; height: 100%; border: none; }
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #888; font-family: sans-serif; font-size: 14px; }
</style>
</head>
<body>
<div class="loading" id="loading">Loading...</div>
<iframe id="frame" style="display:none;" allow="autoplay; fullscreen" allowfullscreen></iframe>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var targetUrl = params.get("url");
  if (!targetUrl) { document.getElementById("loading").textContent = "No URL provided"; return; }

  // Just load the full Splash app with the URL injected via hash
  var frame = document.getElementById("frame");
  frame.src = location.origin + "/#inject=" + encodeURIComponent(targetUrl);
  frame.onload = function() {
    document.getElementById("loading").style.display = "none";
    frame.style.display = "";
  };
  // Fallback — show after 5 seconds regardless
  setTimeout(function() {
    document.getElementById("loading").style.display = "none";
    frame.style.display = "";
  }, 5000);
})();
</script>
</body></html>
